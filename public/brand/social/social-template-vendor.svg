<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none" role="img" aria-label="TrustVend social template — vendor">
  <title>TrustVend — social template (vendor)</title>
  <defs>
    <linearGradient id="tv-bg-vnd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F1F5F1"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="630" fill="url(#tv-bg-vnd)"/>

  <!-- Top verified badge -->
  <g transform="translate(80,80)">
    <rect x="0" y="0" width="220" height="44" rx="22" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
    <g transform="translate(14,12)">
      <circle cx="10" cy="10" r="10" fill="#10B981"/>
      <path d="M6 10 L 9 13 L 14 7" stroke="#FAF8F2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
    <text id="verified-label" x="48" y="28" font-size="13" font-weight="700" fill="#0F2A22" font-family="'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif" letter-spacing="2.5">VERIFIED VENDOR</text>
  </g>

  <g transform="translate(80,180)" font-family="'Plus Jakarta Sans', 'Segoe UI', system-ui, -apple-system, sans-serif">
    <text id="kicker" x="0" y="0" font-size="14" font-weight="700" fill="#10B981" letter-spacing="3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">TRUSTVEND PROFILE</text>

    <text id="handle" x="0" y="80" font-size="84" font-weight="800" fill="#0F2A22" letter-spacing="-2">@vendorhandle</text>
    <text id="headline" x="0" y="170" font-size="44" font-weight="700" fill="#0F2A22" opacity="0.85" letter-spacing="-0.8">Handmade ceramics, Lagos.</text>
    <text id="subhead" x="0" y="222" font-size="22" font-weight="500" fill="#0F2A22" opacity="0.65" letter-spacing="0.4">Curated by the TrustVend editorial desk · 142 reviews.</text>
  </g>

  <!-- Stats row -->
  <g transform="translate(80,460)" font-family="'Plus Jakarta Sans', 'Segoe UI', system-ui, -apple-system, sans-serif">
    <g>
      <text id="stat-1-num" x="0" y="0" font-size="42" font-weight="800" fill="#0F2A22" letter-spacing="-1">4.9</text>
      <text x="0" y="28" font-size="13" font-weight="600" fill="#0F2A22" opacity="0.55" letter-spacing="2.5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">RATING</text>
    </g>
    <line x1="140" y1="-30" x2="140" y2="20" stroke="#0F2A22" stroke-width="1" opacity="0.15"/>

    <g transform="translate(180,0)">
      <text id="stat-2-num" x="0" y="0" font-size="42" font-weight="800" fill="#0F2A22" letter-spacing="-1">142</text>
      <text x="0" y="28" font-size="13" font-weight="600" fill="#0F2A22" opacity="0.55" letter-spacing="2.5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">REVIEWS</text>
    </g>
    <line x1="320" y1="-30" x2="320" y2="20" stroke="#0F2A22" stroke-width="1" opacity="0.15"/>

    <g transform="translate(360,0)">
      <text id="stat-3-num" x="0" y="0" font-size="42" font-weight="800" fill="#0F2A22" letter-spacing="-1">3y</text>
      <text x="0" y="28" font-size="13" font-weight="600" fill="#0F2A22" opacity="0.55" letter-spacing="2.5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">ON TV</text>
    </g>
  </g>

  <!-- Decorative mark -->
  <g transform="translate(900,170)">
    <rect x="0" y="0" width="180" height="180" rx="40" fill="#0F2A22"/>
    <g transform="translate(38,38)">
      <rect x="0" y="0" width="104" height="104" rx="22" fill="#FAF8F2"/>
      <path d="M26 38 H78" stroke="#0F2A22" stroke-width="9" stroke-linecap="round"/>
      <path d="M30 52 L52 76 L74 52" stroke="#0F2A22" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M70 30 L78 38 L66 50" stroke="#FBBF24" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>

  <g transform="translate(80,580)" font-family="'Plus Jakarta Sans', 'Segoe UI', system-ui, -apple-system, sans-serif">
    <text id="url" x="0" y="0" font-size="13" font-weight="600" fill="#0F2A22" opacity="0.55" letter-spacing="2.5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">TRUSTVEND.NG/VENDORS</text>
  </g>
</svg>
