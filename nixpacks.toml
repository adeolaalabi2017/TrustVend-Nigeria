# Nixpacks build configuration for TrustVend-Nigeria
# Pins the Node.js runtime to a supported LTS release (Node 20),
# because Node 18 reached end-of-life and was removed from current nixpkgs.
#
# The project uses Bun as both package manager AND runtime (see
# package.json: `bun install`, `bun .next/standalone/server.js`), so
# `bun` must be installed in the Nix setup phase alongside Node 20 —
# otherwise the install step fails with `bun: command not found`.
#
# NOTE: The Nixpacks schema key is `nixPackages` (camelCase), NOT
# `nixPkgs`. See the BuildPlan struct in
# https://github.com/railwayapp/nixpacks/pull/383 — `nix_pkgs` is
# serde-renamed to `nixPackages`. Using `nixPkgs` is silently ignored.
#
# NOTE: In Nixpacks TOML schema, `providers` must be an array of strings,
# NOT a table. Using a table here (e.g. `[providers]\nnode = "20"`) causes:
#   "invalid type: map, expected a sequence for key 'providers'"
#
# --- Convex codegen workaround -----------------------------------------------
# `convex codegen` aborts on CI/build environments with
#   "No CONVEX_DEPLOYMENT set, run `npx convex dev` to configure a Convex project"
# even though codegen never actually contacts a deployment — it's pure
# local TypeScript emission from convex/schema.ts. The project uses a
# self-hosted Convex backend, so the CLI looks for
# CONVEX_SELF_HOSTED_URL + CONVEX_SELF_HOSTED_ADMIN_KEY instead of
# CONVEX_DEPLOYMENT. The build container has none of these set, so we
# inline inert placeholders on the build command itself. These do NOT
# leak to the runtime container; real values come from the Dokploy env
# config at runtime.

providers = ["node"]

[phases.setup]
nixPackages = ["nodejs_20", "bun"]

[phases.install]
cmds = ["bun install --frozen-lockfile"]

[phases.build]
cmds = [
  "CONVEX_SELF_HOSTED_URL=http://build-time-placeholder.invalid CONVEX_SELF_HOSTED_ADMIN_KEY=build-time-placeholder-key bun run build",
]

[start]
cmd = "bun run start"